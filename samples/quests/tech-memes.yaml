questions:
  - title: |
      What does "works in Chrome" mean in 2026?
    image: https://placehold.co/800x600/2d3748/ffffff?text=Browser+Wars
    image_alt: Browser logos fighting in a battle royale, Chrome wearing a crown
    options:
      - "Works everywhere because all browsers are Chromium now"
      - "I didn't test Safari and neither should you"
      - "I used -webkit- prefixes exclusively"
      - "The CSS Grid I wrote 6 years ago still doesn't work in IE11"
    correct_answer: 1
    explanation: |
      **Works everywhere** — because Chrome, Edge, Brave, Opera, Vivaldi... all use **Blink** (Chromium's engine).
      
      Browser engine market share in 2026:
      - **Blink** (Chromium): ~75%
      - **WebKit** (Safari): ~20%
      - **Gecko** (Firefox): ~4%
      - **IE11**: Still haunting enterprise intranets
      
      ```css
      /* 2015 */
      .box {
        display: -webkit-flex;
        display: -ms-flexbox;
        display: flex;
      }
      
      /* 2026 */
      .box {
        display: flex; /* just works */
      }
      ```
      
      **But still test Safari** — WebKit does its own thing and will humble you.
